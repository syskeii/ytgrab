<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YTGrab</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #ff3b3b;
      --accent2: #ff7b00;
      --text: #f0f0f0;
      --muted: #666;
      --success: #00e87a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,59,59,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,59,59,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .container { position: relative; z-index: 1; width: 100%; max-width: 680px; }

    header { text-align: center; margin-bottom: 3rem; }

    .logo { display: inline-flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }

    .logo-text { font-family: 'Space Mono', monospace; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    .logo-text span { color: var(--accent); }
    header p { color: var(--muted); font-size: 0.95rem; font-weight: 300; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; }

    .url-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }

    .url-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.8rem; outline: none; transition: border-color 0.2s; }
    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); }

    .paste-btn { background: var(--border); border: none; border-radius: 10px; padding: 0.85rem 1.1rem; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    .paste-btn:hover { background: #333; }

    .format-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }

    .format-btn { flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 0.5rem; background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
    .format-btn.active { border-color: var(--accent); color: var(--text); background: rgba(255,59,59,0.08); }
    .format-btn:hover:not(.active) { border-color: #444; color: var(--text); }

    .quality-row { margin-bottom: 1.5rem; }
    .quality-label { font-size: 0.75rem; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.6rem; font-family: 'Space Mono', monospace; }
    .quality-options { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .quality-chip { border: 1px solid var(--border); border-radius: 8px; padding: 0.45rem 0.9rem; background: transparent; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.78rem; cursor: pointer; transition: all 0.2s; }
    .quality-chip.active { border-color: var(--accent2); color: var(--accent2); background: rgba(255,123,0,0.08); }
    .quality-chip:hover:not(.active) { border-color: #444; color: var(--text); }

    .download-btn { width: 100%; padding: 1rem; background: var(--accent); border: none; border-radius: 10px; color: white; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.6rem; letter-spacing: 0.02em; }
    .download-btn:hover:not(:disabled) { background: #e62e2e; transform: translateY(-1px); }
    .download-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .preview-card { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem; flex-direction: row; gap: 1rem; align-items: center; }
    .preview-card.show { display: flex; }
    .preview-thumb { width: 100px; height: 60px; border-radius: 8px; background: var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 1.5rem; overflow: hidden; }
    .preview-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .preview-info { flex: 1; min-width: 0; }
    .preview-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preview-meta { font-size: 0.78rem; color: var(--muted); font-family: 'Space Mono', monospace; }

    .status { display: none; padding: 0.9rem 1rem; border-radius: 10px; font-size: 0.88rem; margin-top: 1rem; font-family: 'Space Mono', monospace; word-break: break-word; line-height: 1.5; }
    .status.show { display: block; }
    .status.error { background: rgba(255,59,59,0.1); border: 1px solid rgba(255,59,59,0.3); color: #ff7070; }
    .status.success { background: rgba(0,232,122,0.08); border: 1px solid rgba(0,232,122,0.2); color: var(--success); }
    .status.info { background: rgba(255,123,0,0.08); border: 1px solid rgba(255,123,0,0.2); color: var(--accent2); }

    .progress-wrap { display: none; margin-top: 1.5rem; }
    .progress-wrap.show { display: block; }
    .progress-header { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); font-family: 'Space Mono', monospace; margin-bottom: 0.5rem; }
    .progress-bar-bg { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; width: 0%; transition: width 0.3s ease; }

    footer { text-align: center; color: var(--muted); font-size: 0.78rem; margin-top: 1rem; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .loading { animation: pulse 1.2s ease-in-out infinite; }

    @media (max-width: 520px) {
      .url-row { flex-direction: column; }
      .format-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">▶</div>
      <div class="logo-text">YT<span>GRAB</span></div>
    </div>
    <p>Download YouTube videos as MP3, M4A, or MP4.</p>
  </header>

  <div class="preview-card" id="previewCard">
    <div class="preview-thumb" id="previewThumb">🎬</div>
    <div class="preview-info">
      <div class="preview-title" id="previewTitle">—</div>
      <div class="preview-meta" id="previewMeta">—</div>
    </div>
  </div>

  <div class="card">
    <div class="url-row">
      <input class="url-input" id="urlInput" type="text" placeholder="https://www.youtube.com/watch?v=..."/>
      <button class="paste-btn" onclick="pasteUrl()">📋 Paste</button>
    </div>

    <div class="format-row">
      <button class="format-btn active" id="btnMp3" onclick="setFormat('mp3')">🎵 MP3</button>
      <button class="format-btn" id="btnM4a" onclick="setFormat('m4a')">🎶 M4A</button>
      <button class="format-btn" id="btnMp4" onclick="setFormat('mp4')">🎬 MP4</button>
    </div>

    <div class="quality-row" id="qualityRow">
      <div class="quality-label">Quality</div>
      <div class="quality-options" id="qualityOptions"></div>
    </div>

    <button class="download-btn" id="downloadBtn" onclick="startDownload()">⬇ Download</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-header">
        <span id="progressLabel">Preparing...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="status" id="statusMsg"></div>
  </div>

  <footer>For personal use only. Respect copyright laws.</footer>
</div>

<script>
  const API_KEY = 'd656abf480msh99b803e4e1dec56p137685jsn67cf073bcd06';
  const API_HOST = 'youtube-mp4-mp3-downloader.p.rapidapi.com';

  let selectedFormat = 'mp3';
  let selectedQuality = '128';
  let fetchTimer = null;

  const qualityMap = {
    mp3: { options: ['128','192','256','320'], labels: ['128k','192k','256k','320k'], default: '128' },
    m4a: { options: [], labels: [], default: '' },
    mp4: { options: ['360','480','720','1080'], labels: ['360p','480p','720p','1080p'], default: '720' },
  };

  window.addEventListener('DOMContentLoaded', () => renderQualities());

  function setFormat(fmt) {
    selectedFormat = fmt;
    document.getElementById('btnMp3').classList.toggle('active', fmt === 'mp3');
    document.getElementById('btnM4a').classList.toggle('active', fmt === 'm4a');
    document.getElementById('btnMp4').classList.toggle('active', fmt === 'mp4');
    renderQualities();
  }

  function renderQualities() {
    const { options, labels, default: def } = qualityMap[selectedFormat];
    const row = document.getElementById('qualityRow');
    if (!options.length) { row.style.display = 'none'; selectedQuality = ''; return; }
    row.style.display = 'block';
    selectedQuality = def;
    document.getElementById('qualityOptions').innerHTML = options.map((q, i) => `
      <button class="quality-chip ${q === selectedQuality ? 'active' : ''}"
        onclick="selectQuality('${q}', this)">${labels[i]}</button>
    `).join('');
  }

  function selectQuality(q, el) {
    selectedQuality = q;
    document.querySelectorAll('.quality-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  async function pasteUrl() {
    try {
      const text = await navigator.clipboard.readText();
      document.getElementById('urlInput').value = text;
      schedulePreviewFetch(text);
    } catch {
      showStatus('Paste failed — try pasting manually.', 'error');
    }
  }

  document.getElementById('urlInput').addEventListener('input', e => {
    schedulePreviewFetch(e.target.value.trim());
  });

  function schedulePreviewFetch(url) {
    clearTimeout(fetchTimer);
    if (!isValidYtUrl(url)) return;
    fetchTimer = setTimeout(() => fetchPreview(url), 800);
  }

  function isValidYtUrl(url) {
    return url.includes('youtube.com/watch') || url.includes('youtu.be/');
  }

  function extractVideoId(url) {
    const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  async function fetchPreview(url) {
    const videoId = extractVideoId(url);
    if (!videoId) return;
    try {
      const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
      if (!res.ok) return;
      const data = await res.json();
      document.getElementById('previewTitle').textContent = data.title || 'Unknown title';
      document.getElementById('previewMeta').textContent = data.author_name || '';
      document.getElementById('previewThumb').innerHTML =
        `<img src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" alt="thumbnail"/>`;
      document.getElementById('previewCard').classList.add('show');
    } catch {}
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  function getHeaders() {
    return { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST };
  }

  async function startDownload() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { showStatus('Please enter a YouTube URL.', 'error'); return; }
    if (!isValidYtUrl(url)) { showStatus("That doesn't look like a valid YouTube URL.", 'error'); return; }

    const videoId = extractVideoId(url);
    if (!videoId) { showStatus('Could not extract video ID from URL.', 'error'); return; }

    const btn = document.getElementById('downloadBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading">⬇ Working...</span>';
    hideStatus();
    showProgress(10, 'Requesting...');

    try {
      const fmt = selectedFormat === 'm4a' ? 'mp3' : selectedFormat;
      const quality = selectedFormat === 'mp4' ? (selectedQuality + 'p') : (selectedQuality || '128');
      const ext = selectedFormat;

      showStatus('⏳ Converting... this can take 10–30 seconds.', 'info');
      showProgress(25, 'Converting...');

      const res = await fetch(
        `https://${API_HOST}/api/v1/download?id=${videoId}&format=${fmt}&quality=${quality}`,
        { headers: getHeaders() }
      );

      if (!res.ok) {
        let errMsg = `API error ${res.status}`;
        try { const e = await res.json(); errMsg = e.message || e.error || errMsg; } catch {}
        throw new Error(errMsg);
      }

      const data = await res.json();
      let downloadUrl = data.link || data.url || data.downloadUrl || data.download_url;
      let title = data.title || 'download';

      if (!downloadUrl && (data.id || data.jobId)) {
        downloadUrl = await pollProgress(data.id || data.jobId);
        title = data.title || title;
      }

      if (!downloadUrl) throw new Error('No download link returned. Try again.');

      showProgress(90, 'Starting download...');
      hideStatus();

      const safeTitle = title.replace(/[^a-z0-9 _\-]/gi, '').trim() || 'download';
      const filename = `${safeTitle}.${ext}`;

      const a = document.createElement('a');
      a.href = downloadUrl;
      a.download = filename;
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      showProgress(100, 'Done!');
      showStatus(`✓ Download started: ${filename}`, 'success');

    } catch (err) {
      hideProgress();
      showStatus(`✗ ${err.message}`, 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '⬇ Download';
      setTimeout(hideProgress, 4000);
    }
  }

  async function pollProgress(jobId, attempts = 0) {
    if (attempts > 20) throw new Error('Timed out. Try again.');
    showProgress(25 + attempts * 3, `Converting... (${attempts * 3}s)`);

    const res = await fetch(
      `https://${API_HOST}/api/v1/progress?id=${jobId}`,
      { headers: getHeaders() }
    );

    if (!res.ok) throw new Error(`Poll error ${res.status}`);
    const data = await res.json();

    const link = data.link || data.url || data.downloadUrl || data.download_url;
    if (link) return link;

    const processing = ['processing','pending','converting','in_progress'].includes((data.status||'').toLowerCase());
    if (processing || !data.status) {
      await delay(3000);
      return pollProgress(jobId, attempts + 1);
    }

    throw new Error('Conversion failed: ' + (data.message || data.status || 'unknown'));
  }

  function showProgress(pct, label) {
    document.getElementById('progressWrap').classList.add('show');
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = Math.round(pct) + '%';
    document.getElementById('progressLabel').textContent = label;
  }

  function hideProgress() {
    document.getElementById('progressWrap').classList.remove('show');
    document.getElementById('progressFill').style.width = '0%';
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = `status show ${type}`;
  }

  function hideStatus() {
    document.getElementById('statusMsg').className = 'status';
  }
</script>
</body>
</html>
